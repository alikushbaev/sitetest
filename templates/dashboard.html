<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мои проекты</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #f4f4f4; padding: 50px; }
        .container { background: white; padding: 20px; border-radius: 10px; width: 400px; margin: auto; box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.1); }
        .project { padding: 10px; border: 1px solid #ccc; border-radius: 5px; margin: 10px 0; background: #fff; }
        a { display: inline-block; margin: 10px; text-decoration: none; color: white; background: #007bff; padding: 10px; border-radius: 5px; }
        a:hover { background: #0056b3; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Мои проекты</h2>
        <a href="/create">Создать новый проект</a>
        {% for project in projects %}
            <div class="project">
                <h3>{{ project[2] }}</h3>
                <p>{{ project[3] }}</p>
                <a href="/edit/{{ project[0] }}">Редактировать</a>
            </div>
        {% endfor %}
    </div>
</body>
</html>
